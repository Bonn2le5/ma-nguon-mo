<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - CloudStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-sky-50">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-blue-100 opacity-40"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-sky-100 opacity-40"></div>
    </div>

    <div class="relative w-full max-w-md px-6 animate-fadeIn">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-lg mb-4">
                <i data-lucide="cloud" class="w-9 h-9 text-white"></i>
            </div>
            <h1 class="text-gray-900 text-2xl font-bold mt-2">CloudStore</h1>
            <p class="text-gray-500 mt-1 text-sm">Đặt lại mật khẩu mới</p>
        </div>

        <!-- Loading card -->
        <div id="cardLoading" class="bg-white rounded-2xl shadow-xl border border-gray-100 p-10 text-center">
            <div class="flex justify-center mb-4">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="text-gray-500 text-sm">Đang xác minh link...</p>
        </div>

        <!-- Form card -->
        <div id="formCard" class="hidden bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-10 h-10 rounded-xl bg-blue-100 flex items-center justify-center shrink-0">
                    <i data-lucide="lock-keyhole" class="w-5 h-5 text-blue-600"></i>
                </div>
                <div>
                    <h2 class="text-gray-800 text-lg font-semibold leading-tight">Mật khẩu mới</h2>
                    <p class="text-gray-500 text-xs">Nhập mật khẩu mới cho tài khoản của bạn</p>
                </div>
            </div>

            <!-- Alert -->
            <div id="alertBox" class="hidden flex items-start gap-2 rounded-lg px-4 py-3 mb-5 text-sm"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1.5 font-medium">Mật khẩu mới</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="password" id="newPass" placeholder="Tối thiểu 6 ký tự..."
                            class="w-full pl-9 pr-10 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                        <button type="button" id="toggleNew" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-700 mb-1.5 font-medium">Xác nhận mật khẩu</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="password" id="confirmPass" placeholder="Nhập lại mật khẩu mới..."
                            class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>
                </div>

                <!-- Strength indicator -->
                <div id="strengthBar" class="hidden">
                    <div class="flex gap-1 mb-1">
                        <div id="s1" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                        <div id="s2" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                        <div id="s3" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                        <div id="s4" class="h-1 flex-1 rounded-full bg-gray-200 transition-colors"></div>
                    </div>
                    <p id="strengthText" class="text-xs text-gray-400"></p>
                </div>

                <button id="submitBtn"
                    class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white rounded-lg text-sm transition flex items-center justify-center gap-2 font-semibold">
                    <i data-lucide="check" class="w-4 h-4"></i>
                    Đặt lại mật khẩu
                </button>
            </div>
        </div>

        <!-- Success card -->
        <div id="cardSuccess" class="hidden bg-white rounded-2xl shadow-xl border border-gray-100 p-10 text-center">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
                    <i data-lucide="shield-check" class="w-9 h-9 text-green-600"></i>
                </div>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Mật khẩu đã được đặt lại!</h2>
            <p class="text-gray-500 text-sm mb-6">Bạn có thể đăng nhập bằng mật khẩu mới ngay bây giờ.</p>
            <a href="login.html"
               class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                Đăng nhập
            </a>
        </div>

        <!-- Error card (link hết hạn / không hợp lệ) -->
        <div id="cardError" class="hidden bg-white rounded-2xl shadow-xl border border-gray-100 p-10 text-center">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center">
                    <i data-lucide="link-2-off" class="w-9 h-9 text-red-500"></i>
                </div>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Link không hợp lệ</h2>
            <p id="errorMsg" class="text-gray-500 text-sm mb-6">Link đã hết hạn hoặc đã được sử dụng.</p>
            <a href="forgot-password.html"
               class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                Yêu cầu lại
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const token      = new URLSearchParams(location.search).get('token');
        const newPass    = document.getElementById('newPass');
        const confirmPass= document.getElementById('confirmPass');
        const submitBtn  = document.getElementById('submitBtn');
        const alertBox   = document.getElementById('alertBox');

        // Kiểm tra token có tồn tại không (chỉ kiểm tra phía client)
        if (!token) {
            showCard('error', 'Không tìm thấy token trong URL.');
        } else {
            showCard('form');
        }

        function showCard(type, msg = '') {
            ['cardLoading', 'formCard', 'cardSuccess', 'cardError'].forEach(id =>
                document.getElementById(id).classList.add('hidden')
            );
            const map = { loading: 'cardLoading', form: 'formCard', success: 'cardSuccess', error: 'cardError' };
            document.getElementById(map[type]).classList.remove('hidden');
            if (msg) document.getElementById('errorMsg').textContent = msg;
            lucide.createIcons();
        }

        function showAlert(msg, type = 'error') {
            const isError = type === 'error';
            alertBox.className = `flex items-start gap-2 rounded-lg px-4 py-3 mb-5 text-sm ${
                isError ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700'
            }`;
            alertBox.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 shrink-0"></i><span>${msg}</span>`;
            alertBox.classList.remove('hidden');
            lucide.createIcons();
        }

        // Toggle show password
        document.getElementById('toggleNew').addEventListener('click', function () {
            const t = newPass.type === 'password' ? 'text' : 'password';
            newPass.type = t;
            this.querySelector('i').setAttribute('data-lucide', t === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        // Password strength
        newPass.addEventListener('input', () => {
            const v = newPass.value;
            const bar = document.getElementById('strengthBar');
            if (!v) { bar.classList.add('hidden'); return; }
            bar.classList.remove('hidden');

            let score = 0;
            if (v.length >= 6)  score++;
            if (v.length >= 10) score++;
            if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
            if (/[^A-Za-z0-9]/.test(v)) score++;

            const colors = ['bg-red-400','bg-orange-400','bg-yellow-400','bg-green-500'];
            const labels = ['Quá yếu','Yếu','Khá tốt','Mạnh'];
            for (let i = 1; i <= 4; i++) {
                const el = document.getElementById(`s${i}`);
                el.className = `h-1 flex-1 rounded-full transition-colors ${i <= score ? colors[score-1] : 'bg-gray-200'}`;
            }
            document.getElementById('strengthText').textContent = labels[score - 1] || '';
        });

        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.innerHTML = on
                ? '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Đang xử lý...'
                : '<i data-lucide="check" class="w-4 h-4"></i> Đặt lại mật khẩu';
            lucide.createIcons();
        }

        submitBtn.addEventListener('click', async () => {
            alertBox.classList.add('hidden');
            const p1 = newPass.value;
            const p2 = confirmPass.value;

            if (p1.length < 6) { showAlert('Mật khẩu phải có ít nhất 6 ký tự.'); return; }
            if (p1 !== p2)     { showAlert('Mật khẩu xác nhận không khớp.'); return; }

            setLoading(true);
            try {
                const res  = await fetch(`/api/auth/reset-password/${token}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: p1 })
                });
                const data = await res.json();
                if (res.ok) {
                    showCard('success');
                } else {
                    if (res.status === 410 || res.status === 400) {
                        showCard('error', data.message);
                    } else {
                        showAlert(data.message || 'Có lỗi xảy ra.');
                    }
                }
            } catch {
                showAlert('Không thể kết nối đến server.');
            }
            setLoading(false);
        });

        confirmPass.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitBtn.click();
        });
    </script>
</body>
</html>
