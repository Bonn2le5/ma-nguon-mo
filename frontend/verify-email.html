<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận Email - CloudStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-sky-50">
    <div class="w-full max-w-md px-6 text-center">
        <!-- Logo -->
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-lg mb-4">
            <i data-lucide="cloud" class="w-9 h-9 text-white"></i>
        </div>
        <h1 class="text-gray-900 text-2xl font-bold mb-8">CloudStore</h1>

        <!-- Card (loading) -->
        <div id="cardLoading" class="bg-white rounded-2xl shadow-xl border border-gray-100 p-10">
            <div class="flex justify-center mb-4">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
            <p class="text-gray-500 text-sm">Đang xác nhận email của bạn...</p>
        </div>

        <!-- Card (success) -->
        <div id="cardSuccess" class="hidden bg-white rounded-2xl shadow-xl border border-gray-100 p-10">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
                    <i data-lucide="check-circle" class="w-9 h-9 text-green-600"></i>
                </div>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Email đã được xác nhận!</h2>
            <p class="text-gray-500 text-sm mb-6">Tài khoản của bạn đã được kích hoạt. Bạn có thể đăng nhập ngay.</p>
            <a href="login.html"
               class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                Đăng nhập
            </a>
        </div>

        <!-- Card (error) -->
        <div id="cardError" class="hidden bg-white rounded-2xl shadow-xl border border-gray-100 p-10">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full bg-red-100 flex items-center justify-center">
                    <i data-lucide="x-circle" class="w-9 h-9 text-red-500"></i>
                </div>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Xác nhận thất bại</h2>
            <p id="errorMsg" class="text-gray-500 text-sm mb-6">Link không hợp lệ hoặc đã hết hạn.</p>
            <div class="flex flex-col gap-3">
                <a href="login.html"
                   class="inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Về trang đăng nhập
                </a>
                <button id="resendBtn"
                    class="inline-flex items-center justify-center gap-2 bg-gray-100 hover:bg-gray-200 text-gray-700 px-6 py-2.5 rounded-lg font-semibold text-sm transition">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    Gửi lại email xác nhận
                </button>
            </div>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>

    <script>
        lucide.createIcons();

        const token = new URLSearchParams(location.search).get('token');

        async function verify() {
            if (!token) {
                showError('Không tìm thấy token xác nhận trong URL.');
                return;
            }
            try {
                const res  = await fetch(`/api/auth/verify-email/${token}`);
                const data = await res.json();
                if (res.ok) {
                    showSuccess();
                } else {
                    showError(data.message);
                }
            } catch {
                showError('Không thể kết nối đến server.');
            }
        }

        function showSuccess() {
            document.getElementById('cardLoading').classList.add('hidden');
            document.getElementById('cardSuccess').classList.remove('hidden');
            lucide.createIcons();
        }

        function showError(msg) {
            document.getElementById('cardLoading').classList.add('hidden');
            document.getElementById('cardError').classList.remove('hidden');
            document.getElementById('errorMsg').textContent = msg;
            lucide.createIcons();
        }

        // Gửi lại email xác nhận
        document.getElementById('resendBtn').addEventListener('click', async () => {
            const email = prompt('Nhập email đã đăng ký của bạn:');
            if (!email) return;
            try {
                const res  = await fetch('/api/auth/resend-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                alert(data.message);
            } catch {
                alert('Lỗi gửi mail. Vui lòng thử lại sau.');
            }
        });

        verify();
    </script>
</body>
</html>
