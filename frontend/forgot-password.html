<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - CloudStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-sky-50">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-blue-100 opacity-40"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-sky-100 opacity-40"></div>
    </div>

    <div class="relative w-full max-w-md px-6 animate-fadeIn">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-lg mb-4">
                <i data-lucide="cloud" class="w-9 h-9 text-white"></i>
            </div>
            <h1 class="text-gray-900 text-2xl font-bold mt-2">CloudStore</h1>
            <p class="text-gray-500 mt-1 text-sm">Khôi phục mật khẩu của bạn</p>
        </div>

        <!-- Form -->
        <div id="formCard" class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-10 h-10 rounded-xl bg-orange-100 flex items-center justify-center shrink-0">
                    <i data-lucide="key-round" class="w-5 h-5 text-orange-500"></i>
                </div>
                <div>
                    <h2 class="text-gray-800 text-lg font-semibold leading-tight">Quên mật khẩu?</h2>
                    <p class="text-gray-500 text-xs">Nhập email để nhận link đặt lại mật khẩu</p>
                </div>
            </div>

            <!-- Alert -->
            <div id="alertBox" class="hidden flex items-start gap-2 rounded-lg px-4 py-3 mb-5 text-sm"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1.5 font-medium">Địa chỉ Email</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="email" id="emailInput" placeholder="Nhập email đã đăng ký..."
                            class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>
                </div>

                <button id="submitBtn"
                    class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white rounded-lg text-sm transition flex items-center justify-center gap-2 font-semibold">
                    <i data-lucide="send" class="w-4 h-4"></i>
                    Gửi link đặt lại mật khẩu
                </button>
            </div>

            <div class="mt-6 text-center text-sm text-gray-500">
                Nhớ mật khẩu rồi?
                <a href="login.html" class="text-blue-600 hover:text-blue-700 font-medium">Đăng nhập</a>
            </div>
        </div>

        <!-- Success Card -->
        <div id="successCard" class="hidden bg-white rounded-2xl shadow-xl border border-gray-100 p-10 text-center">
            <div class="flex justify-center mb-4">
                <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center">
                    <i data-lucide="mail-check" class="w-9 h-9 text-green-600"></i>
                </div>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Kiểm tra email của bạn!</h2>
            <p class="text-gray-500 text-sm mb-2">
                Chúng tôi đã gửi link đặt lại mật khẩu đến
            </p>
            <p id="sentEmail" class="font-semibold text-blue-600 text-sm mb-6"></p>
            <p class="text-gray-400 text-xs mb-6">Link có hiệu lực trong <strong>1 giờ</strong>. Kiểm tra cả mục Spam nếu không thấy.</p>
            <div class="flex flex-col gap-3">
                <a href="login.html"
                   class="inline-flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-semibold text-sm transition">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Về trang đăng nhập
                </a>
                <button id="resendBtn"
                    class="inline-flex items-center justify-center gap-2 text-gray-500 hover:text-gray-700 text-sm transition gap-1">
                    <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i>
                    Gửi lại email
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const emailInput = document.getElementById('emailInput');
        const submitBtn  = document.getElementById('submitBtn');
        const alertBox   = document.getElementById('alertBox');
        let lastEmail    = '';

        function showAlert(msg, type = 'error') {
            const isError = type === 'error';
            alertBox.className = `flex items-start gap-2 rounded-lg px-4 py-3 mb-5 text-sm ${
                isError ? 'bg-red-50 border border-red-200 text-red-700' : 'bg-green-50 border border-green-200 text-green-700'
            }`;
            alertBox.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="w-4 h-4 mt-0.5 shrink-0"></i><span>${msg}</span>`;
            alertBox.classList.remove('hidden');
            lucide.createIcons();
        }

        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.innerHTML = on
                ? '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Đang gửi...'
                : '<i data-lucide="send" class="w-4 h-4"></i> Gửi link đặt lại mật khẩu';
            lucide.createIcons();
        }

        async function sendReset(email) {
            setLoading(true);
            alertBox.classList.add('hidden');
            try {
                const res  = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('sentEmail').textContent = email;
                    document.getElementById('formCard').classList.add('hidden');
                    document.getElementById('successCard').classList.remove('hidden');
                    lucide.createIcons();
                } else {
                    showAlert(data.message || 'Có lỗi xảy ra. Vui lòng thử lại.');
                }
            } catch {
                showAlert('Không thể kết nối đến server.');
            }
            setLoading(false);
        }

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showAlert('Vui lòng nhập địa chỉ email hợp lệ.');
                return;
            }
            lastEmail = email;
            await sendReset(email);
        });

        emailInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') submitBtn.click();
        });

        document.getElementById('resendBtn').addEventListener('click', () => {
            if (lastEmail) sendReset(lastEmail);
        });
    </script>
</body>
</html>
