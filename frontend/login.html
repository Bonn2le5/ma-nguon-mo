<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CloudStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 via-white to-sky-50">
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 rounded-full bg-blue-100 opacity-40"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full bg-sky-100 opacity-40"></div>
    </div>

    <div class="relative w-full max-w-md px-6 animate-fadeIn">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 shadow-lg mb-4">
                <i data-lucide="cloud" class="w-9 h-9 text-white"></i>
            </div>
            <h1 class="text-gray-900 text-2xl font-bold mt-2">CloudStore</h1>
            <p class="text-gray-500 mt-1 text-sm">Hệ thống lưu trữ file cá nhân</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">
            <h2 class="text-gray-800 mb-1 text-xl font-semibold">Đăng nhập</h2>
            <p class="text-gray-500 text-sm mb-6">Nhập thông tin tài khoản của bạn</p>

            <!-- Error Alert -->
            <div id="errorAlert" class="hidden flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-5 text-sm">
                <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 shrink-0"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-700 mb-1.5 font-medium">Tên đăng nhập</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="text" id="username" placeholder="Nhập tên đăng nhập..."
                            class="w-full pl-9 pr-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-gray-700 mb-1.5 font-medium">Mật khẩu</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                        <input type="password" id="password" placeholder="Nhập mật khẩu..."
                            class="w-full pl-9 pr-10 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                        <button type="button" id="togglePass" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i data-lucide="eye" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white rounded-lg text-sm transition flex items-center justify-center gap-2 font-semibold mt-2">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Đăng nhập
                </button>
            </form>

            <div class="mt-6 text-center text-sm text-gray-500">
                Chưa có tài khoản?
                <a href="register.html" class="text-blue-600 hover:text-blue-700 font-medium">Đăng ký ngay</a>
            </div>
        </div>

        <!-- Demo -->
        <div class="mt-4 bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 text-xs text-blue-700">
            <p class="font-semibold mb-1">Tài khoản demo:</p>
            <p>• Admin: <span class="font-medium">admin</span> / <span class="font-medium">admin123</span></p>
        </div>

        <p class="text-center text-xs text-gray-400 mt-5">Powered by Node.js · Express · MySQL</p>
    </div>

    <script>
        lucide.createIcons();

        // Nếu đã đăng nhập rồi → redirect luôn
        if (localStorage.getItem('token')) {
            window.location.href = localStorage.getItem('role') === 'admin' ? 'admin.html' : 'file.html';
        }

        const form     = document.getElementById('loginForm');
        const username = document.getElementById('username');
        const password = document.getElementById('password');
        const submitBtn= document.getElementById('submitBtn');
        const errAlert = document.getElementById('errorAlert');
        const errText  = document.getElementById('errorText');

        // Toggle password
        document.getElementById('togglePass').addEventListener('click', function() {
            const t = password.type === 'password' ? 'text' : 'password';
            password.type = t;
            this.querySelector('i').setAttribute('data-lucide', t === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        function showError(msg) {
            errText.textContent = msg;
            errAlert.classList.remove('hidden');
        }

        function setLoading(on) {
            submitBtn.disabled = on;
            submitBtn.innerHTML = on
                ? '<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></div> Đang đăng nhập...'
                : '<i data-lucide="log-in" class="w-4 h-4"></i> Đăng nhập';
            lucide.createIcons();
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errAlert.classList.add('hidden');

            const u = username.value.trim();
            const p = password.value.trim();

            if (!u || !p) { showError('Vui lòng nhập đầy đủ thông tin.'); return; }

            setLoading(true);
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();

                if (!res.ok) {
                    showError(data.message || 'Sai tên đăng nhập hoặc mật khẩu.');
                    setLoading(false);
                    return;
                }

                // Lưu token + thông tin
                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                localStorage.setItem('role', data.role);

                // Redirect theo role
                window.location.href = data.role === 'admin' ? 'admin.html' : 'file.html';

            } catch (err) {
                showError('Không thể kết nối tới server. Vui lòng thử lại.');
                setLoading(false);
            }
        });

        // Enter key
        password.addEventListener('keydown', e => {
            if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
        });
    </script>
</body>
</html>
